<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <h1>URL Shortener</h1>

        <form action="/shorten" method="post">

            <input
                type="text"
                name="original_url"
                placeholder="Enter long URL"
                required
            >

            <button type="submit">
                Shorten URL
            </button>

        </form>

        {% if short_url %}

        <div class="result">
            <p>Short URL:</p>

            <a href="{{ short_url }}" target="_blank">
                {{ short_url }}
            </a>
        </div>

        {% endif %}

    </div>

</body>
</html>
